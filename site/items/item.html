<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chi tiết mặt hàng — Giá Chợ</title>
  <meta name="description" content="Chi tiết sản phẩm và lịch sử giá tại BHX và WinMart.">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../assets/app.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="../index.html" aria-label="Giá Chợ">
        <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
          <rect x="2" y="2" width="44" height="44" rx="11" fill="#141821" stroke="rgba(255,255,255,0.10)"/>
          <path d="M17 20a7 7 0 0 1 14 0" fill="none" stroke="#2dd4a7" stroke-width="2.4" stroke-linecap="round"/>
          <rect x="11.5" y="19" width="25" height="4.2" rx="2.1" fill="#2dd4a7"/>
          <path d="M14.5 23.5 L33.5 23.5 L30.6 36 a2 2 0 0 1-1.95 1.6 H19.35 a2 2 0 0 1-1.95-1.6 Z" fill="none" stroke="#2dd4a7" stroke-width="2.2" stroke-linejoin="round"/>
          <rect x="18.4" y="30" width="3" height="4.2" rx="1.1" fill="#3987e5"/>
          <rect x="22.5" y="27.6" width="3" height="6.6" rx="1.1" fill="#5aa0ee"/>
          <rect x="26.6" y="25" width="3" height="9.2" rx="1.1" fill="#7db6f3"/>
        </svg>
        <span>
          <span class="name">Giá Chợ</span>
          <span class="tag">Chỉ số giá thực phẩm hàng tuần · BHX &amp; WinMart</span>
        </span>
      </a>
      <nav class="nav">
        <a href="../index.html">Dashboard</a>
        <a href="../methodology.html">Phương pháp</a>
        <a class="cta" href="https://github.com/Quang-Dobe/Agents-VietName-Grocery-Price/blob/main/docs/WORKFLOW.md">Cách hoạt động ↗</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <p class="crumb"><a href="../index.html">← Dashboard</a></p>
    <h1 class="item-title" id="itemTitle">Đang tải…</h1>
    <p class="item-group" id="itemGroup"></p>

    <section class="grid chains" id="chains" aria-label="Chi tiết theo siêu thị"></section>

    <section class="card chart-card">
      <h2>Lịch sử đơn giá chuẩn</h2>
      <p class="hint" id="unitHint"></p>
      <div class="legend">
        <span class="item"><span class="swatch" style="background:#199e70"></span> BHX</span>
        <span class="item"><span class="swatch" style="background:#e66767"></span> WinMart</span>
      </div>
      <div class="chart-box"><canvas id="itemChart"></canvas></div>
      <div style="margin-top:12px"><button class="toggle" id="tblBtn">Bảng số liệu</button></div>
      <div class="tableview" id="tblPanel" hidden>
        <table><thead><tr><th>Tuần</th><th>BHX (đ)</th><th>WinMart (đ)</th></tr></thead>
          <tbody id="tblBody"></tbody></table>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap row">
      <span>Giá Chợ · chỉ số giá thực phẩm</span>
      <span>
        <a href="../index.html">Dashboard</a> ·
        <a href="../methodology.html">Phương pháp</a> ·
        <a href="https://github.com/Quang-Dobe/Agents-VietName-Grocery-Price/blob/main/docs/WORKFLOW.md">Cách hoạt động</a>
      </span>
      <span>Dữ liệu tự thu thập, chỉ để tham khảo.</span>
    </div>
  </footer>

  <script src="../assets/chart.umd.min.js"></script>
  <script src="../assets/app.js"></script>
  <script>
  (function () {
    var vnd = new Intl.NumberFormat("vi-VN");
    var id = new URLSearchParams(location.search).get("id");
    var dot = { bhx: "#199e70", winmart: "#e66767" }, label = { bhx: "Bách Hóa Xanh", winmart: "WinMart" };

    function mrow(t) { var e = document.createElement("div"); e.className = "meta-row"; e.textContent = t; return e; }
    function ph() { var p = document.createElement("div"); p.className = "prod-img ph"; p.textContent = "🛒"; return p; }

    function chainCard(ch, c, don_vi_chuan, ten_chuan) {
      var card = document.createElement("div"); card.className = "card chain-card";
      if (c && c.hinh_anh) {
        var img = document.createElement("img"); img.className = "prod-img"; img.src = c.hinh_anh;
        img.alt = c.ten_hien_thi || ten_chuan; img.loading = "lazy";
        img.onerror = function () { img.replaceWith(ph()); };
        card.appendChild(img);
      } else { card.appendChild(ph()); }
      var body = document.createElement("div"); body.className = "chain-body";
      var head = document.createElement("div"); head.className = "chain-name";
      var sw = document.createElement("span"); sw.className = "dot"; sw.style.background = dot[ch];
      head.appendChild(sw); head.appendChild(document.createTextNode(label[ch])); body.appendChild(head);
      if (!c || c.trang_thai === "out_of_stock" || !c.ten_hien_thi) {
        var none = document.createElement("p"); none.className = "empty";
        none.textContent = ch === "bhx" ? "Chưa lấy được (nguồn tạm chặn)" : "Không có tại cửa hàng";
        body.appendChild(none); card.appendChild(body); return card;
      }
      var dn = document.createElement("div"); dn.className = "disp-name"; dn.textContent = c.ten_hien_thi; body.appendChild(dn);
      if (c.thuong_hieu) body.appendChild(mrow("Thương hiệu: " + c.thuong_hieu));
      if (c.danh_muc) body.appendChild(mrow("Danh mục: " + c.danh_muc));
      var pb = document.createElement("div"); pb.className = "price-block";
      var pay = (c.gia_khuyen_mai != null ? c.gia_khuyen_mai : c.gia_niem_yet);
      var now = document.createElement("span"); now.className = "price-now"; now.textContent = pay != null ? vnd.format(pay) + "đ" : "–"; pb.appendChild(now);
      if (c.gia_khuyen_mai != null && c.gia_niem_yet != null && c.gia_niem_yet !== c.gia_khuyen_mai) {
        var old = document.createElement("span"); old.className = "price-old"; old.textContent = vnd.format(c.gia_niem_yet) + "đ"; pb.appendChild(old);
      }
      var st = c.trang_thai || "in_stock";
      var badge = document.createElement("span"); badge.className = "badge " + (st === "in_stock" ? "in" : st === "carry_forward" ? "carry" : "out");
      badge.textContent = st === "in_stock" ? "Còn hàng" : st === "carry_forward" ? "Giữ giá cũ" : "Hết hàng"; pb.appendChild(badge);
      body.appendChild(pb);
      if (c.don_gia_chuan != null) { var up = document.createElement("div"); up.className = "unitprice"; up.textContent = "Đơn giá chuẩn: " + vnd.format(c.don_gia_chuan) + "đ/" + (don_vi_chuan || "đv"); body.appendChild(up); }
      if (c.url) { var sl = document.createElement("div"); sl.className = "store-line"; var a = document.createElement("a"); a.href = c.url; a.textContent = "Xem trên web ↗"; a.target = "_blank"; a.rel = "noopener"; sl.appendChild(a); body.appendChild(sl); }
      card.appendChild(body); return card;
    }

    function render(item, hist) {
      document.getElementById("itemTitle").textContent = item.ten_chuan;
      document.getElementById("itemGroup").textContent = item.nhom || "";
      document.getElementById("unitHint").textContent = "đơn giá theo đ/" + (item.don_vi_chuan || "đơn vị");
      var host = document.getElementById("chains");
      ["bhx", "winmart"].forEach(function (ch) { host.appendChild(chainCard(ch, (item.chains || {})[ch], item.don_vi_chuan, item.ten_chuan)); });
      var h = hist || { labels: [], bhx: [], winmart: [] };
      window.GiaCho.initItemChart(document.getElementById("itemChart"), { labels: h.labels, bhx: h.bhx, winmart: h.winmart, unit: item.don_vi_chuan });
      var tb = document.getElementById("tblBody");
      (h.labels || []).forEach(function (wk, i) {
        var tr = document.createElement("tr");
        [wk, h.bhx[i] != null ? vnd.format(h.bhx[i]) : "–", h.winmart[i] != null ? vnd.format(h.winmart[i]) : "–"]
          .forEach(function (t, j) { var td = document.createElement("td"); td.textContent = t; if (j === 0) td.style.textAlign = "left"; tr.appendChild(td); });
        tb.appendChild(tr);
      });
      window.GiaCho.wireToggle(document.getElementById("tblBtn"), document.getElementById("tblPanel"));
    }

    if (!id) { document.getElementById("itemTitle").textContent = "Thiếu mã mặt hàng"; return; }
    Promise.all([
      fetch("../data/products.json", { cache: "no-store" }).then(function (r) { return r.json(); }),
      fetch("../data/items/" + encodeURIComponent(id) + ".json", { cache: "no-store" }).then(function (r) { return r.ok ? r.json() : null; }).catch(function () { return null; })
    ]).then(function (res) {
      var item = (res[0].items || []).find(function (x) { return x.id === id; });
      if (!item) { document.getElementById("itemTitle").textContent = "Không tìm thấy mặt hàng"; return; }
      render(item, res[1]);
    }).catch(function () { document.getElementById("itemTitle").textContent = "Lỗi tải dữ liệu"; });
  })();
  </script>
</body>
</html>
