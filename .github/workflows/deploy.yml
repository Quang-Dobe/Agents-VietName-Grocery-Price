name: Deploy site to GitHub Pages

# Publishes the static dashboard in site/ to GitHub Pages.
# Repo Settings → Pages → Source must be set to "GitHub Actions" for this to run.

on:
  push:
    branches: [claude/website-design-docs-plan-v1ljj3]
    paths:
      - "site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

# Least-privilege token; Pages deploy needs pages:write + id-token:write.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
